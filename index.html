<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fire The Gun</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="menu">
        <h1 class="logo">🔥 FIRE THE GUN</h1>
        <p class="tag">Fight • Survive • Become Legend</p>
        <button onclick="startGame()">Start Battle</button>
        <button onclick="openProfile()">Profile</button>
    </div>

    <div id="profile" class="hidden">
        <h2>Player Profile</h2>
        <input id="nameInput" placeholder="Enter Name">
        <button onclick="saveName()">Save</button>
        <button onclick="backMenu()">Back</button>
    </div>

    <div id="game" class="hidden">

        <div id="hud">
            <span>❤️ <span id="health">100</span></span>
            <span>🔫 <span id="ammo">30</span></span>
            <span>⚔ <span id="gun">AK</span></span>
            <span>🩺 <span id="medkit">2</span></span>
            <span>☠ <span id="kills">0</span></span>
            <span>⏱ <span id="timer">0</span></span>
        </div>

        <canvas id="canvas"></canvas>
        <button id="quit" onclick="exitGame()">QUIT</button>

    </div>

    <script src="function.js"></script>
</body>

</html>
